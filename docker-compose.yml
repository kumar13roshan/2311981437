services:
  backend:
    image: node:22-alpine
    working_dir: /app/notification_app_be
    command: sh -c "npm install && npm run dev"
    ports:
      - "5000:5000"
    env_file:
      - ./notification_app_be/.env
    volumes:
      - ./:/app
    environment:
      - PORT=5000

  frontend:
    image: node:22-alpine
    working_dir: /app/notification_app_fe
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    env_file:
      - ./notification_app_fe/.env
    volumes:
      - ./:/app
    depends_on:
      - backend
